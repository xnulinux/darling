name: Build (headless, slim)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/share/powershell /usr/local/share/chromium \
                      /usr/local/lib/node_modules
          docker system prune -af || true
          df -h

      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            cmake clang bison flex pkg-config \
            libfuse-dev libudev-dev libxml2-dev \
            libelf-dev libcap2-bin libbsd-dev libdbus-1-dev \
            libssl-dev python3 libstdc++-12-dev linux-headers-generic \
            gcc-multilib build-essential dpkg-dev \
            ccache git ca-certificates xz-utils

      - name: Cache submodule clones
        uses: actions/cache@v4
        with:
          path: .git/modules
          key: darling-submodules-v1-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            darling-submodules-v1-

      - name: Rewrite submodule URLs to upstream
        shell: bash
        run: |
          # .gitmodules uses relative URLs (../foo.git) which would resolve
          # against this fork's origin. Only the parent repo is forked, not
          # the ~130 submodule repos, so point them at upstream darlinghq.
          # Submodule SHAs are pinned in this repo, so this is reproducible.
          sed -i 's|url = \.\./|url = https://github.com/darlinghq/|g' .gitmodules
          git submodule sync --recursive

      - name: Init only needed submodules
        shell: bash
        run: |
          set -euo pipefail
          # Submodules NOT needed for a headless cli build.
          # Either gated behind COMPONENT_gui/jsc/webkit/python/ruby/perl/iokitd,
          # or removed via -DBUILD_SWIFT=OFF / -DBUILD_LEGACY_LIBRESSL=OFF.
          SKIP=(
            src/external/cocotron
            src/external/cups
            src/external/dbuskit
            src/external/WTF
            src/external/bmalloc
            src/external/JavaScriptCore
            src/external/WebCore
            src/external/python
            src/external/python_modules
            src/external/pyobjc
            src/external/ruby
            src/external/perl
            src/external/metal
            src/external/openjdk
            src/external/glut
            src/external/OpenAL
            src/external/mDNSResponder
            src/external/TextEdit
            src/external/swift
            src/external/IOStorageFamily
            src/external/IONetworkingFamily
            src/external/iokitd
            src/external/libffi
            src/external/libressl-2.2.9
            src/external/libressl-2.5.5
            src/external/libressl-2.6.5
          )
          mapfile -t ALL < <(git config --file .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          KEEP=()
          for path in "${ALL[@]}"; do
            skip=0
            for s in "${SKIP[@]}"; do
              if [[ "$path" == "$s" ]]; then skip=1; break; fi
            done
            (( skip == 0 )) && KEEP+=("$path")
          done
          echo "Initializing ${#KEEP[@]} of ${#ALL[@]} submodules (skipping ${#SKIP[@]})"
          git submodule update --init --depth=1 --recursive --jobs=8 -- "${KEEP[@]}"
          df -h

      - name: Patch submodules for headless Release build
        shell: bash
        run: |
          set -euo pipefail
          # objc4 hardcodes -DOBJC_IS_DEBUG_BUILD=1 unconditionally; in Release
          # builds DEBUG is undefined, so objc-runtime.mm:127 #errors out on
          # the macro mismatch. Set it to 0; CMAKE_C_FLAGS_DEBUG re-adds =1 for
          # Debug builds (later -D wins in the preprocessor).
          F=src/external/objc4/runtime/CMakeLists.txt
          grep -q -- '-DOBJC_NO_GC -DOBJC_IS_DEBUG_BUILD=1' "$F" \
            || { echo "::error::objc4 patch pattern missing — submodule changed?"; exit 1; }
          sed -i 's|-DOBJC_NO_GC -DOBJC_IS_DEBUG_BUILD=1|-DOBJC_NO_GC -DOBJC_IS_DEBUG_BUILD=0|' "$F"

          # libxpc/src/runtime.m imports <AppKit/NSApplication.h> only to type
          # the dlsym() result. AppKit headers come from cocotron, which we
          # exclude for headless. Drop the import and inline the signature.
          F=src/external/libxpc/src/runtime.m
          grep -q '#import <AppKit/NSApplication.h>' "$F" \
            || { echo "::error::libxpc AppKit import missing — submodule changed?"; exit 1; }
          sed -i '/^#import <AppKit\/NSApplication.h>$/d' "$F"
          sed -i 's|__typeof__(NSApplicationMain)\* NSApplicationMain_ptr|int (*NSApplicationMain_ptr)(int, const char**)|' "$F"
          grep -q 'int (\*NSApplicationMain_ptr)(int, const char\*\*)' "$F" \
            || { echo "::error::libxpc signature patch did not apply"; exit 1; }

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: darling-headless-${{ runner.os }}
          max-size: 3G

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCOMPONENTS=cli \
            -DTARGET_i386=OFF \
            -DBUILD_SWIFT=OFF \
            -DBUILD_LEGACY_LIBRESSL=OFF

      - name: Build
        run: |
          cd build
          make -j$(nproc)
          df -h

      - name: Install to staging dir
        run: |
          cd build
          sudo make install DESTDIR=$GITHUB_WORKSPACE/install
          du -sh $GITHUB_WORKSPACE/install || true

      - name: Pack artifact
        run: |
          tar --use-compress-program='xz -T0 -3' \
              -cf darling-headless.tar.xz \
              -C $GITHUB_WORKSPACE/install .
          ls -lh darling-headless.tar.xz

      - uses: actions/upload-artifact@v4
        with:
          name: darling-headless
          path: darling-headless.tar.xz
          if-no-files-found: error
